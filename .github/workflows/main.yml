name: Enterprise Multi-Environment Deployment

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: python-app

jobs:
  build-and-test:
    name: Build, Test and SonarQube Analysis
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s tests

      - name: Generate Docker Tag
        id: tag
        run: |
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: SonarQube Scan and Quality Gate
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    outputs:
      image_tag: ${{ needs.build-and-test.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image_tag }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image_tag }}

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: DEV

    steps:
      - name: Deploy to DEV EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

            docker pull $IMAGE

            docker stop python-app || true
            docker rm python-app || true

            docker run -d \
              --name python-app \
              --restart always \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              -p 5000:5000 \
              $IMAGE

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: QA

    steps:
      - name: Deploy to QA EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

            docker pull $IMAGE

            docker stop python-app || true
            docker rm python-app || true

            docker run -d \
              --name python-app \
              --restart always \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              -p 5000:5000 \
              $IMAGE

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment: PROD

    steps:
      - name: Deploy to PROD EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

            docker pull $IMAGE

            docker stop python-app || true
            docker rm python-app || true

            docker run -d \
              --name python-app \
              --restart always \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              -p 5000:5000 \
              $IMAGE
