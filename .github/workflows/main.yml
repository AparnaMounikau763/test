name: Multi-Environment Deployment

on:
  push:
    branches:
      - develop
      - qa
      - main

env:
  IMAGE_NAME: python-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'develop' && 'DEV' || github.ref_name == 'qa' && 'QA' || 'PROD' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Docker Tag
        id: tag
        run: |
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

            docker pull $IMAGE

            docker stop python-app || true
            docker rm python-app || true

            docker run -d \
              --name python-app \
              --restart always \
              --env-file ${{ secrets.ENV_FILE_PATH }} \
              -p 5000:5000 \
              $IMAGE
